name: Feature Request
description: Propose a new pattern, public API, or library capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use **English**. Large work should be split **per solution module** (one Issue per module). See [AGENTS.md](https://github.com/Skymly/DesignPatterns/blob/main/AGENTS.md).

        **Note:** Public APIs are **not stable** yet (early-stage project). Breaking changes may land without a major version until stability is announced.

  - type: dropdown
    id: module
    attributes:
      label: Target solution module
      options:
        - Runtime
        - Diagnostics
        - SourceGenerators
        - Analyzers
        - DependencyInjection
        - Package
        - Samples
        - Docs
        - Repository
        - New pattern / generator
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What scenario are you trying to support?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: APIs, attributes, generators, or DI integration
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done? (tests, docs, sample usage)
      placeholder: |
        - [ ] ...
        - [ ] dotnet test DesignPatterns.slnx
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I am not mixing multiple unrelated features in this issue
          required: true
