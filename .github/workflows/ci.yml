name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/global.json', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore DesignPatterns.slnx

      - name: Build
        run: dotnet build DesignPatterns.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DesignPatterns.slnx --configuration Release --no-build --verbosity normal

      - name: Build samples
        shell: bash
        run: |
          set -euo pipefail
          for proj in samples/*/*.csproj; do
            echo "Building $proj"
            dotnet build "$proj" -c Release
          done

  pack:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/global.json', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Pack meta-package
        run: |
          dotnet restore DesignPatterns.slnx
          dotnet pack DesignPatterns.Package/DesignPatterns.Package.csproj -c Release -o artifacts/packages

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg
          if-no-files-found: error
