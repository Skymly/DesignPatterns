name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DesignPatterns.slnx

      - name: Build
        run: dotnet build DesignPatterns.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DesignPatterns.slnx --configuration Release --no-build --verbosity normal

      - name: Build samples
        run: |
          dotnet build samples/GenerateSingleton.Sample/GenerateSingleton.Sample.csproj -c Release
          dotnet build samples/Strategy.Sample/Strategy.Sample.csproj -c Release
          dotnet build samples/Chain.Sample/Chain.Sample.csproj -c Release
          dotnet build samples/Composite.Sample/Composite.Sample.csproj -c Release
          dotnet build samples/Factory.Sample/Factory.Sample.csproj -c Release
