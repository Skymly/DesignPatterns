name: Publish NuGet

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 0.1.0-preview1)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: contains(fromJson('["Skymly","wys0610"]'), github.actor)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            echo "Error: tag must start with 'v'. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Error: VERSION is empty"
            exit 1
          fi

          echo "Publishing version: ${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Pack, verify, and publish via Nuke
        env:
          VERSION: ${{ env.VERSION }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          dotnet run --project build/_build.csproj -- --root . --target Publish --configuration Release 2>&1 | tee publish.log

      - name: Upload publish log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuget-publish-log
          path: publish.log
          if-no-files-found: warn

      - name: Upload package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/package/*.nupkg
          if-no-files-found: warn

      - name: Write publish summary
        if: always()
        shell: bash
        run: |
          {
            echo "## NuGet Publish Summary"
            echo ""
            echo "- Version: \`${VERSION:-unknown}\`"
            echo "- Trigger: \`${GITHUB_EVENT_NAME}\`"
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- Actor: \`${GITHUB_ACTOR}\`"
            echo "- Job status: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
